name: validate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  json-and-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON files
        run: |
          for f in $(find ontology -name '*.json'); do
            echo "Checking $f"
            python -m json.tool "$f" > /dev/null
          done

      - name: Compile Python sources
        run: |
          python -m compileall -q scripts ontology

      - name: Lint discover.py with ruff
        run: |
          pip install ruff
          ruff check scripts/discover.py ontology/export.py

      - name: Run ontology static tests
        run: python -m unittest discover -s ontology/tests -v

      - name: Run script tests
        run: python -m unittest discover -s scripts/tests -v

      - name: Run drift check
        run: python scripts/check_drift.py

  age-integration:
    runs-on: ubuntu-latest
    services:
      age:
        image: apache/age:PG16_latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5455:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install psycopg
        run: pip install "psycopg[binary]"

      - name: Run AGE integration tests
        env:
          OPEN_STAR_AGE_DSN: postgresql://postgres:postgres@localhost:5455/postgres
        run: python -m unittest ontology.tests.test_age_integration -v

      - name: Smoke-test load_ecosystem.py against the live graph
        env:
          OPEN_STAR_AGE_DSN: postgresql://postgres:postgres@localhost:5455/postgres
        run: |
          python - <<'PY'
          import os, psycopg
          dsn = os.environ['OPEN_STAR_AGE_DSN']
          with psycopg.connect(dsn, autocommit=True) as c:
              c.execute("LOAD 'age';")
              c.execute('SET search_path = ag_catalog, "$user", public;')
              c.execute("SELECT create_graph('open_star_load_smoke');")
          PY
          python scripts/load_ecosystem.py \
            --dsn "$OPEN_STAR_AGE_DSN" \
            --graph open_star_load_smoke
          python - <<'PY'
          import os, psycopg
          dsn = os.environ['OPEN_STAR_AGE_DSN']
          with psycopg.connect(dsn, autocommit=True) as c:
              c.execute("LOAD 'age';")
              c.execute('SET search_path = ag_catalog, "$user", public;')
              rows = c.execute(
                "SELECT * FROM cypher('open_star_load_smoke', $$ "
                "MATCH (p:Project) RETURN count(p) $$) AS (n agtype);"
              ).fetchall()
              print('Project count:', rows[0][0])
              assert int(str(rows[0][0])) > 400, 'expected >400 projects'
              c.execute("SELECT drop_graph('open_star_load_smoke', true);")
          PY

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken relative links in README and SESSION
        run: |
          python - <<'PY'
          import pathlib, re, sys
          root = pathlib.Path('.')
          bad = []
          for md in ['README.md', 'SESSION.md', 'CLAUDE.md', 'CONTRIBUTING.md',
                    'ECOSYSTEM.md', 'context.md', 'prompts.md', 'MY_JOURNEY.md']:
              p = root / md
              if not p.exists():
                  continue
              for m in re.finditer(r'\]\(([^)#]+\.md)(?:#[^)]*)?\)', p.read_text()):
                  target = (root / m.group(1)).resolve()
                  if not target.exists():
                      bad.append(f"{md}: missing {m.group(1)}")
          if bad:
              print('\n'.join(bad))
              sys.exit(1)
          print('All relative .md links resolve.')
          PY

  project-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify each projects/*.md has YAML frontmatter
        run: |
          fail=0
          for f in projects/*.md; do
            head -1 "$f" | grep -q '^---$' || { echo "Missing frontmatter: $f"; fail=1; }
          done
          exit $fail
